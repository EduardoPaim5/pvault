name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DISPLAY: ''
  WAYLAND_DISPLAY: ''

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.profile }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: archlinux:base-devel
      options: --init --ulimit core=0:0 --ulimit memlock=8388608:8388608
    strategy:
      fail-fast: false
      matrix:
        profile: [gcc, clang, sanitize, release]
    steps:
      - name: Install build dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          cmake ninja pkgconf libsodium libcbor ncurses xclip
          gcc clang git python
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Trust and verify Git checkout
        run: |
          test "$(pwd -P)" = "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          test "$(git rev-parse --is-inside-work-tree)" = true
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git ls-files --error-unmatch .github/workflows/ci.yml >/dev/null
      - name: Build and test
        run: ./scripts/ci-build.sh "${{ matrix.profile }}"

  leak-sanitizer:
    name: Standalone LeakSanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: archlinux:base-devel
      options: --init --cap-add=SYS_PTRACE --ulimit core=0:0 --ulimit memlock=8388608:8388608
    steps:
      - name: Install leak-check dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          cmake ninja pkgconf libsodium libcbor ncurses xclip
          clang git python
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Trust and verify Git checkout
        run: |
          test "$(pwd -P)" = "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          test "$(git rev-parse --is-inside-work-tree)" = true
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git ls-files --error-unmatch .github/workflows/ci.yml >/dev/null
      - name: Detect product leaks under preserved process hardening
        run: ./scripts/ci-build.sh lsan

  fuzz-smoke:
    name: libFuzzer smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: archlinux:base-devel
      options: --init --ulimit core=0:0 --ulimit memlock=8388608:8388608
    steps:
      - name: Install fuzz dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          cmake ninja pkgconf libsodium libcbor ncurses xclip
          clang git python
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Trust and verify Git checkout
        run: |
          test "$(pwd -P)" = "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          test "$(git rev-parse --is-inside-work-tree)" = true
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git ls-files --error-unmatch .github/workflows/ci.yml >/dev/null
      - name: Run bounded fuzz smoke
        env:
          PVAULT_FUZZ_RUNS: '2000'
        run: ./scripts/fuzz-smoke.sh

  real-x11-clipboard:
    name: Real xclip on disposable X11
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: archlinux:base-devel
      options: --init --ulimit core=0:0 --ulimit memlock=8388608:8388608
    steps:
      - name: Install X11 test dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          cmake ninja pkgconf libsodium libcbor ncurses
          xclip libx11 xorg-server-xvfb xorg-xauth
          gcc git python
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Trust and verify Git checkout
        run: |
          test "$(pwd -P)" = "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          test "$(git rev-parse --is-inside-work-tree)" = true
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git ls-files --error-unmatch .github/workflows/ci.yml >/dev/null
      - name: Exercise the real X11 clipboard owner
        run: ./scripts/test-real-x11.sh

  real-wayland-clipboard:
    name: Wayland retention characterization (non-installable)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: archlinux:base-devel
      options: --init --ulimit core=0:0 --ulimit memlock=8388608:8388608
    steps:
      - name: Install Wayland test dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          cmake ninja pkgconf libsodium libcbor ncurses xclip
          weston wl-clipboard
          gcc git python
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Trust and verify Git checkout
        run: |
          test "$(pwd -P)" = "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          test "$(git rev-parse --is-inside-work-tree)" = true
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git ls-files --error-unmatch .github/workflows/ci.yml >/dev/null
      - name: Reproduce the Weston retention boundary
        run: ./scripts/test-real-wayland.sh

  reproducibility:
    name: Reproducible install tree
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: archlinux:base-devel
      options: --init --ulimit core=0:0 --ulimit memlock=8388608:8388608
    steps:
      - name: Install release dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          cmake ninja pkgconf libsodium libcbor ncurses xclip
          gcc git python
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Trust and verify Git checkout
        run: |
          test "$(pwd -P)" = "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          test "$(git rev-parse --is-inside-work-tree)" = true
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git ls-files --error-unmatch .github/workflows/ci.yml >/dev/null
      - name: Check publication boundary
        run: ./scripts/check-publication.sh
      - name: Compare two independent builds
        run: ./scripts/reproducible-build.sh
